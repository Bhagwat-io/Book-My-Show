apiVersion: apps/v1
kind: Deployment
metadata:
  name: bms-app
  namespace: bhagwat
  labels:
    app: bms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bms
  template:
    metadata:
      labels:
        app: bms
    spec:
      containers:
      - name: bms-container
        image: bhagwat07/bms-app:v1.0.0
        ports:
        - containerPort: 3000 
